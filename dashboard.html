<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parashakthi - Authority Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-slate-900 text-slate-100 min-h-screen">
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🛡️</span>
                <h1 class="text-xl font-bold">Parashakthi Dashboard</h1>
            </div>
            <a href="index.html" class="text-emerald-400 hover:text-emerald-300">← Back to Map</a>
        </div>
    </header>

    <main class="p-4 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="text-slate-400 text-sm">Total Incidents</h3>
                <p id="totalIncidents" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="text-slate-400 text-sm">This Month</h3>
                <p id="thisMonth" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="text-slate-400 text-sm">By Type</h3>
                <p id="incidentTypes" class="text-sm text-slate-300">--</p>
            </div>
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="text-slate-400 text-sm">Top Risk Area</h3>
                <p id="topArea" class="text-sm text-slate-300">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="font-semibold mb-4">Incidents by Type</h3>
                <canvas id="typeChart" class="max-h-64"></canvas>
            </div>
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="font-semibold mb-4">Time Distribution</h3>
                <canvas id="timeChart" class="max-h-64"></canvas>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 mb-6">
            <h3 class="font-semibold mb-4">Top Unsafe Areas</h3>
            <div id="unsafeAreas" class="space-y-2"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase/firebaseConfig.js"></script>
    <script src="firebase/firestore.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
